name: Refresh data

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch fresh data
        run: node scripts/fetch.mjs

      - name: Commit if changed
        run: |
          git config user.name  "thelist-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh data $(date -u +%Y-%m-%d)"
            git push
          fi
