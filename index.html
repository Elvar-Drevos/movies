<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>THE LIST — Top Music & Top Movies</title>
<meta name="description" content="THE LIST — daily top 5 music and movies" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap">
<style>
  :root {
    --teal: #2bb6ad;
    --coral: #f17a7a;
    --title: #14454a;
    --pink-text: #f17a7a;
    --bg: #eef2f3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    background: var(--bg);
    color: #222;
    -webkit-font-smoothing: antialiased;
    min-height: 100%;
  }
  body {
    padding: 32px 16px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .toggle {
    display: inline-flex;
    background: #fff;
    border-radius: 999px;
    padding: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
  }
  .toggle button {
    border: 0;
    background: transparent;
    padding: 10px 22px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    font-size: 14px;
    color: var(--title);
    border-radius: 999px;
    cursor: pointer;
    transition: background .2s, color .2s;
  }
  .toggle button.active { background: var(--coral); color: #fff; }

  .stage {
    width: 100%;
    max-width: 980px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .card {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #fff;
    border-radius: 6px;
    box-shadow: 0 18px 40px rgba(0,0,0,0.12);
    display: grid;
    grid-template-columns: 30% 18% 1fr;
    overflow: hidden;
    position: relative;
  }

  .left {
    position: relative;
    background: var(--teal);
    color: #fff;
    padding: 6% 7%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .left::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.18) 1.4px, transparent 1.6px);
    background-size: 14px 14px;
    opacity: 0.55;
    pointer-events: none;
  }
  .left::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, rgba(255,255,255,0.05) 0 35%, transparent 35% 65%, rgba(0,0,0,0.05) 65% 100%);
    pointer-events: none;
  }

  .badge {
    position: relative;
    z-index: 1;
    background: var(--coral);
    color: #fff;
    width: 78%;
    aspect-ratio: 1 / 1;
    max-width: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 0.95;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  }
  .badge .the  { font-size: clamp(18px, 3.2vw, 36px); letter-spacing: 1px; margin-bottom: 4px; }
  .badge .list { font-size: clamp(38px, 7.5vw, 86px); letter-spacing: 2px; }

  .meta {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: auto;
  }
  .pill {
    background: var(--coral);
    color: #fff;
    padding: 8px 14px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 2px;
    font-size: clamp(11px, 1.3vw, 15px);
    text-transform: uppercase;
    align-self: flex-start;
  }
  .week {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    color: #fff;
    font-size: clamp(13px, 1.6vw, 19px);
    letter-spacing: 1.5px;
    line-height: 1.25;
  }

  .middle {
    background: var(--coral);
    display: grid;
    grid-template-rows: repeat(5, 1fr);
  }
  .middle .row {
    display: grid;
    grid-template-columns: 50% 50%;
    align-items: center;
    border-bottom: 2px solid rgba(255,255,255,0.25);
  }
  .middle .row:last-child { border-bottom: 0; }
  .middle .num {
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: clamp(34px, 5.5vw, 60px);
    text-align: center;
    line-height: 1;
  }
  .cover {
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-color: #ddd;
  }

  .right {
    padding: 3.5% 4.5%;
    display: grid;
    grid-template-rows: repeat(5, 1fr);
  }
  .entry {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 4px 0;
    border-bottom: 1px solid #eee;
  }
  .entry:last-child { border-bottom: 0; }
  .entry h2 {
    color: var(--title);
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(15px, 2.1vw, 23px);
    line-height: 1.15;
    letter-spacing: -0.2px;
  }
  .entry .sub  { color: #2e2e2e; font-size: clamp(11px, 1.35vw, 14px); margin-top: 2px; font-weight: 500; }
  .entry .last { color: #8a8a8a; font-size: clamp(10px, 1.15vw, 12px); margin-top: 3px; font-weight: 500; }
  .entry .pink { color: var(--pink-text); font-size: clamp(10px, 1.15vw, 12px); font-weight: 600; margin-top: 1px; }

  .card[hidden] { display: none; }
  .status { color: #6c7a7d; font-size: 13px; }
  .status.error { color: #c0392b; }

  @media (max-width: 720px) {
    .card { aspect-ratio: auto; grid-template-columns: 32% 16% 1fr; }
    .right { padding: 10px 14px; }
    .entry h2 { font-size: 14px; }
    .entry .sub, .entry .last, .entry .pink { font-size: 10px; }
    .middle .num { font-size: 28px; }
    .badge .list { font-size: 36px; }
    .badge .the { font-size: 14px; }
    .pill { font-size: 10px; padding: 6px 10px; }
    .week { font-size: 11px; }
  }

  footer { color: #6c7a7d; font-size: 12px; margin-top: 8px; text-align: center; }
  footer a { color: #178a83; text-decoration: none; }
</style>
</head>
<body>

  <div class="toggle" role="tablist" aria-label="Lijst kiezen">
    <button id="btn-music"  class="active" role="tab" aria-selected="true">TOP MUSIC</button>
    <button id="btn-movies" role="tab" aria-selected="false">TOP MOVIES</button>
    <button id="btn-both"   role="tab" aria-selected="false">BEIDE</button>
  </div>

  <div id="status" class="status">Loading…</div>

  <div class="stage">
    <article class="card" id="card-music"  aria-label="Top Music"></article>
    <article class="card" id="card-movies" aria-label="Top Movies" hidden></article>
  </div>

  <footer>
    THE LIST &mdash; Music: <a href="https://www.apple.com/itunes/charts/" target="_blank" rel="noopener">Apple Music</a> &middot;
    Movies: <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a>
    &middot; <span id="updated"></span>
  </footer>

<script>
  const COVER_FALLBACK = 'linear-gradient(135deg, #2bb6ad, #14454a)';

  const fallbackData = {
    updated: new Date().toISOString(),
    music:  { weekLabel: '—', items: [] },
    movies: { weekLabel: '—', items: [] },
  };

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => (
      { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
    ));
  }

  function renderCard(el, label, weekLabel, items, opts = {}) {
    const padded = [...items];
    while (padded.length < 5) padded.push(null);

    const rowsHtml = padded.slice(0, 5).map((it, i) => {
      const cover = it?.artwork
        ? `background-image:url('${escapeHtml(it.artwork)}');`
        : `background:${COVER_FALLBACK};`;
      return `
        <div class="row">
          <span class="num">${i + 1}</span>
          <div class="cover" style="${cover}"></div>
        </div>`;
    }).join('');

    const entriesHtml = padded.slice(0, 5).map((it) => {
      if (!it) return `<div class="entry"></div>`;
      const lastLine = it.lastWeek != null
        ? `<span class="last">Last Week: ${it.lastWeek}</span>`
        : `<span class="last">Last Week: —</span>`;
      const extraLine = it.extra
        ? `<span class="pink">${escapeHtml(it.extra)}</span>`
        : '';
      return `
        <div class="entry">
          <h2>${escapeHtml(it.title)}</h2>
          <span class="sub">${escapeHtml(it.subtitle)}</span>
          ${lastLine}
          ${extraLine}
        </div>`;
    }).join('');

    el.innerHTML = `
      <div class="left">
        <div class="badge"><span class="the">THE</span><span class="list">LIST</span></div>
        <div class="meta">
          <span class="pill">${escapeHtml(label)}</span>
          <span class="week">THE WEEK OF<br/>${escapeHtml(weekLabel)}</span>
        </div>
      </div>
      <div class="middle">${rowsHtml}</div>
      <div class="right">${entriesHtml}</div>
    `;
  }

  function render(data) {
    renderCard(
      document.getElementById('card-music'),
      'TOP MUSIC',
      data.music.weekLabel,
      data.music.items
    );
    renderCard(
      document.getElementById('card-movies'),
      'TOP MOVIES',
      data.movies.weekLabel,
      data.movies.items
    );
    if (data.updated) {
      const d = new Date(data.updated);
      document.getElementById('updated').textContent =
        'Updated ' + d.toLocaleString('nl-NL', { dateStyle: 'medium', timeStyle: 'short' });
    }
  }

  async function load() {
    const status = document.getElementById('status');
    try {
      const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      render(data);
      status.remove();
    } catch (err) {
      console.error(err);
      render(fallbackData);
      status.textContent = 'Kon data.json niet laden — toon je lege template. (' + err.message + ')';
      status.classList.add('error');
    }
  }

  // Toggle
  const btnMusic  = document.getElementById('btn-music');
  const btnMovies = document.getElementById('btn-movies');
  const btnBoth   = document.getElementById('btn-both');
  const cardMusic  = document.getElementById('card-music');
  const cardMovies = document.getElementById('card-movies');

  function setActive(btn) {
    [btnMusic, btnMovies, btnBoth].forEach(b => {
      b.classList.toggle('active', b === btn);
      b.setAttribute('aria-selected', b === btn ? 'true' : 'false');
    });
  }
  btnMusic .addEventListener('click', () => { cardMusic.hidden = false; cardMovies.hidden = true;  setActive(btnMusic); });
  btnMovies.addEventListener('click', () => { cardMusic.hidden = true;  cardMovies.hidden = false; setActive(btnMovies); });
  btnBoth  .addEventListener('click', () => { cardMusic.hidden = false; cardMovies.hidden = false; setActive(btnBoth); });

  load();
</script>
</body>
</html>
