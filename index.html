<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>THE LIST — Signage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap">
<style>
  :root {
    --teal: #2bb6ad;
    --coral: #f17a7a;
    --title: #14454a;
    --pink-text: #f17a7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: #222;
    -webkit-font-smoothing: antialiased;
    cursor: none;
  }

  .stage {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  .card {
    position: absolute;
    inset: 0;
    background: #fff;
    display: grid;
    grid-template-columns: 30% 18% 1fr;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
    pointer-events: none;
  }
  .card.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* LEFT teal panel */
  .left {
    position: relative;
    background: var(--teal);
    color: #fff;
    padding: 6% 7%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .left::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(rgba(255,255,255,0.18) 1.6px, transparent 1.8px);
    background-size: 18px 18px;
    opacity: 0.55;
    pointer-events: none;
  }
  .left::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(115deg, rgba(255,255,255,0.05) 0 35%, transparent 35% 65%, rgba(0,0,0,0.05) 65% 100%);
    pointer-events: none;
  }

  .badge {
    position: relative;
    z-index: 1;
    background: var(--coral);
    color: #fff;
    width: 70%;
    aspect-ratio: 1 / 1;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 0.95;
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  }
  .badge .the  { font-size: clamp(22px, 2.6vw, 48px); letter-spacing: 1px; margin-bottom: 6px; }
  .badge .list { font-size: clamp(48px, 6vw, 110px); letter-spacing: 3px; }

  .meta {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 18px;
    margin-top: auto;
  }
  .pill {
    background: var(--coral);
    color: #fff;
    padding: 10px 18px;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 2.5px;
    font-size: clamp(14px, 1.4vw, 22px);
    text-transform: uppercase;
    align-self: flex-start;
  }
  .week {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    color: #fff;
    font-size: clamp(16px, 1.7vw, 26px);
    letter-spacing: 1.5px;
    line-height: 1.25;
  }

  /* MIDDLE strip */
  .middle {
    background: var(--coral);
    display: grid;
    grid-template-rows: repeat(5, 1fr);
  }
  .middle .row {
    display: grid;
    grid-template-columns: 50% 50%;
    align-items: center;
    border-bottom: 2px solid rgba(255,255,255,0.25);
  }
  .middle .row:last-child { border-bottom: 0; }
  .middle .num {
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: clamp(48px, 5.5vw, 96px);
    text-align: center;
    line-height: 1;
  }
  .cover {
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #ddd;
  }
  /* Movie posters are 2:3 portrait — show whole poster, no crop */
  #card-movies .cover {
    background-size: contain;
    background-color: var(--coral);
  }

  /* RIGHT entries */
  .right {
    padding: 3% 4%;
    display: grid;
    grid-template-rows: repeat(5, 1fr);
  }
  .entry {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 6px 0;
    border-bottom: 1px solid #eee;
  }
  .entry:last-child { border-bottom: 0; }
  .entry h2 {
    color: var(--title);
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: clamp(22px, 2.4vw, 40px);
    line-height: 1.1;
    letter-spacing: -0.3px;
  }
  .entry .sub  { color: #2e2e2e; font-size: clamp(14px, 1.3vw, 22px); margin-top: 4px; font-weight: 500; }
  .entry .sub.bold { font-weight: 700; color: var(--title); }
  .entry .last { color: #8a8a8a; font-size: clamp(12px, 1.05vw, 18px); margin-top: 4px; font-weight: 500; }
  .entry .pink { color: var(--pink-text); font-size: clamp(12px, 1.05vw, 18px); font-weight: 600; margin-top: 2px; }

  /* Progress dots bottom-right */
  .dots {
    position: fixed;
    right: 24px;
    bottom: 24px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    border: 1px solid rgba(0,0,0,0.15);
    transition: background 0.3s;
  }
  .dot.active { background: var(--coral); }

  /* Portrait fallback (in case signage is rotated) */
  @media (max-aspect-ratio: 1/1) {
    .card { grid-template-columns: 35% 18% 1fr; }
    .badge .list { font-size: clamp(40px, 9vw, 80px); }
    .middle .num { font-size: clamp(36px, 7vw, 72px); }
    .entry h2 { font-size: clamp(16px, 3vw, 28px); }
  }
</style>
</head>
<body>

<div class="stage">
  <article class="card active" id="card-music"></article>
  <article class="card" id="card-movies"></article>
</div>

<div class="dots">
  <div class="dot active" id="dot-0"></div>
  <div class="dot" id="dot-1"></div>
</div>

<script>
  const ROTATE_MS = 5000;          // Wissel elke 5 seconden
  const RELOAD_MS = 30 * 60 * 1000; // Herlaad data.json elke 30 min
  const COVER_FALLBACK = 'linear-gradient(135deg, #2bb6ad, #14454a)';

  const fallbackData = {
    music:  { weekLabel: '—', items: [] },
    movies: { weekLabel: '—', items: [] },
  };

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => (
      { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]
    ));
  }

  function renderEntry(it, type) {
    if (!it) return `<div class="entry"></div>`;
    if (type === 'music') {
      const lw = it.lastWeek != null
        ? `Last Week: ${it.lastWeek}`
        : 'NEW';
      return `
        <div class="entry">
          <h2>${escapeHtml(it.title)}</h2>
          <span class="sub">${escapeHtml(it.subtitle)}</span>
          <span class="last">${lw}</span>
        </div>`;
    }
    // movies
    return `
      <div class="entry">
        <h2>${escapeHtml(it.title)}</h2>
        <span class="sub bold">${escapeHtml(it.weekendGross)}</span>
        <span class="last">${escapeHtml(it.studio)}</span>
      </div>`;
  }

  function renderCard(el, type, label, weekLabel, items) {
    const padded = [...items];
    while (padded.length < 5) padded.push(null);

    const rowsHtml = padded.slice(0, 5).map((it, i) => {
      const cover = it?.artwork
        ? `background-image:url('${escapeHtml(it.artwork)}');`
        : `background:${COVER_FALLBACK};`;
      return `
        <div class="row">
          <span class="num">${i + 1}</span>
          <div class="cover" style="${cover}"></div>
        </div>`;
    }).join('');

    const entriesHtml = padded.slice(0, 5).map(it => renderEntry(it, type)).join('');

    el.innerHTML = `
      <div class="left">
        <div class="badge"><span class="the">THE</span><span class="list">LIST</span></div>
        <div class="meta">
          <span class="pill">${escapeHtml(label)}</span>
          <span class="week">THE WEEK OF<br/>${escapeHtml(weekLabel)}</span>
        </div>
      </div>
      <div class="middle">${rowsHtml}</div>
      <div class="right">${entriesHtml}</div>
    `;
  }

  function render(data) {
    renderCard(
      document.getElementById('card-music'),
      'music',
      'TOP MUSIC',
      data.music.weekLabel,
      data.music.items
    );
    renderCard(
      document.getElementById('card-movies'),
      'movies',
      'TOP MOVIES',
      data.movies.weekLabel,
      data.movies.items
    );
  }

  async function load() {
    try {
      const res = await fetch('data.json?t=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP ' + res.status);
      render(await res.json());
    } catch (err) {
      console.error('Data load failed:', err);
      render(fallbackData);
    }
  }

  // Rotate between cards every ROTATE_MS
  const cards = [document.getElementById('card-music'), document.getElementById('card-movies')];
  const dots  = [document.getElementById('dot-0'), document.getElementById('dot-1')];
  let idx = 0;
  function rotate() {
    idx = (idx + 1) % cards.length;
    cards.forEach((c, i) => c.classList.toggle('active', i === idx));
    dots .forEach((d, i) => d.classList.toggle('active', i === idx));
  }
  setInterval(rotate, ROTATE_MS);

  // Background data refresh
  setInterval(load, RELOAD_MS);

  // Initial load
  load();
</script>
</body>
</html>
